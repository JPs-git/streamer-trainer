<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>直播间聊天</title>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">
      <span>直播间聊天</span>
      <span id="scheduler-status" class="status-paused">● 已暂停</span>
      <span id="viewer-count">0人在线</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-footer">
      <div id="input-row">
        <input id="anchor-input" type="text" placeholder="输入主播台词..." autocomplete="off">
        <button id="btn-send">发送</button>
      </div>
      <button id="btn-toggle-scheduler">▶ 开始</button>
    </div>
  </div>
  <script src="script.js?v=20260606"></script>
</body>
</html>
